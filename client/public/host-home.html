<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会议管理系统 - 总主持人</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <div class="app-container">
    <!-- 顶部导航栏 -->
    <nav class="navbar">
      <div class="navbar-brand">会议管理系统</div>
      <div class="navbar-user">
        <span id="user-name"></span>
        <span class="role-badge role-host">总主持人</span>
        <button class="btn btn-sm btn-outline" onclick="window.location.href='/public/config-editor.html'">系统配置</button>
        <button class="btn btn-sm btn-outline" onclick="window.location.href='/public/logs.html'">操作日志</button>
        <button class="btn btn-sm btn-outline" onclick="API.logout()">退出</button>
      </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-content">
      <div style="max-width: 1100px; margin: 20px auto;">

        <!-- 顶部操作区 -->
        <div class="grid grid-3" style="margin-bottom: 24px;">
          <!-- 加入会议 -->
          <div class="card">
            <div class="card-header">加入会议</div>
            <div class="card-body">
              <form onsubmit="joinMeetingById(event)">
                <div class="form-group">
                  <label>会议 ID</label>
                  <input type="text" id="join-id" placeholder="输入会议 ID" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">加入会议</button>
              </form>
            </div>
          </div>

          <!-- 发起会议 -->
          <div class="card">
            <div class="card-header">发起会议</div>
            <div class="card-body">
              <form onsubmit="createSimpleMeeting(event)">
                <div class="form-group">
                  <label>会议名称</label>
                  <input type="text" id="simple-meeting-name" placeholder="输入会议名称" required>
                </div>
                <button type="submit" class="btn btn-success btn-block">创建会议</button>
              </form>
              <div id="simple-created" style="display:none; margin-top: 12px; padding: 10px; background: var(--primary-light); border-radius: var(--radius); font-size: 13px;">
                <strong>已创建</strong> ID: <code id="simple-id" style="user-select:all;"></code>
                <button class="btn btn-sm btn-primary" style="margin-left: 8px;" id="simple-enter">进入</button>
              </div>
            </div>
          </div>

          <!-- 发起分组会议 -->
          <div class="card">
            <div class="card-header">发起分组会议</div>
            <div class="card-body">
              <form onsubmit="createGroupMeeting(event)">
                <div class="form-group">
                  <label>会议名称</label>
                  <input type="text" id="group-meeting-name" placeholder="输入会议名称" required>
                </div>
                <!-- 分组列表（从配置读取） -->
                <div id="group-config-list" style="margin-bottom: 12px; max-height: 150px; overflow-y: auto; font-size: 13px;">
                  <div class="loading"><div class="spinner" style="width:24px;height:24px;"></div></div>
                </div>
                <button type="submit" class="btn btn-success btn-block">创建分组会议</button>
              </form>
              <div id="group-created" style="display:none; margin-top: 12px; padding: 10px; background: var(--primary-light); border-radius: var(--radius); font-size: 13px;">
                <strong>已创建</strong> ID: <code id="group-id" style="user-select:all;"></code>
                <button class="btn btn-sm btn-primary" style="margin-left: 8px;" id="group-enter">进入</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 进行中的会议 -->
        <div class="card" style="margin-bottom: 24px;">
          <div class="card-header">
            进行中的会议
            <button class="btn btn-sm btn-outline" onclick="loadMeetings()">刷新</button>
          </div>
          <div class="card-body" id="meetings-container">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- 所有分组和成员概览 -->
        <div class="grid grid-2">
          <!-- 分组概览 -->
          <div class="card">
            <div class="card-header">分组概览</div>
            <div class="card-body" id="groups-overview">
              <div class="loading"><div class="spinner"></div></div>
            </div>
          </div>

          <!-- 全部成员列表 -->
          <div class="card">
            <div class="card-header">全部成员</div>
            <div class="card-body" id="all-members" style="max-height: 400px; overflow-y: auto;">
              <div class="loading"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 消息提示容器 -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/src/utils/api.js"></script>
  <script>
    // 检查登录状态和角色
    const user = API.getCurrentUser();
    if (!user || !API.getToken() || user.role !== 'host') {
      window.location.href = '/public/login.html';
    }
    document.getElementById('user-name').textContent = user.displayName;

    // 配置信息缓存
    let configInfo = null;

    /**
     * 显示消息提示
     */
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    /**
     * 通过 ID 加入会议
     */
    function joinMeetingById(e) {
      e.preventDefault();
      const id = document.getElementById('join-id').value.trim();
      window.location.href = `/public/meeting.html?id=${id}&role=host`;
    }

    /**
     * 创建简单会议（不含分组）
     */
    async function createSimpleMeeting(e) {
      e.preventDefault();
      const name = document.getElementById('simple-meeting-name').value.trim();
      try {
        const data = await API.createMeeting(name);
        document.getElementById('simple-id').textContent = data.meeting.id;
        document.getElementById('simple-created').style.display = 'block';
        document.getElementById('simple-enter').onclick = () => {
          window.location.href = `/public/meeting.html?id=${data.meeting.id}&role=host`;
        };
        showToast('会议创建成功', 'success');
        loadMeetings();
      } catch (err) {
        showToast('创建失败: ' + err.message, 'error');
      }
    }

    /**
     * 创建分组会议（使用配置中的分组）
     */
    async function createGroupMeeting(e) {
      e.preventDefault();
      const name = document.getElementById('group-meeting-name').value.trim();
      try {
        const groups = configInfo ? configInfo.groups : [];
        const data = await API.createMeeting(name, groups);
        document.getElementById('group-id').textContent = data.meeting.id;
        document.getElementById('group-created').style.display = 'block';
        document.getElementById('group-enter').onclick = () => {
          window.location.href = `/public/meeting.html?id=${data.meeting.id}&role=host`;
        };
        showToast('分组会议创建成功', 'success');
        loadMeetings();
      } catch (err) {
        showToast('创建失败: ' + err.message, 'error');
      }
    }

    /**
     * 加载会议列表
     */
    async function loadMeetings() {
      const container = document.getElementById('meetings-container');
      try {
        const data = await API.getMeetings();
        if (data.meetings.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>暂无进行中的会议</p></div>';
          return;
        }
        container.innerHTML = `<table class="table">
          <thead><tr><th>会议名称</th><th>ID</th><th>分组数</th><th>创建者</th><th>创建时间</th><th>操作</th></tr></thead>
          <tbody>
            ${data.meetings.map(m => `
              <tr>
                <td><strong>${m.name}</strong></td>
                <td><code>${m.id}</code></td>
                <td>${m.groupCount}</td>
                <td>${m.createdBy}</td>
                <td>${new Date(m.createdAt).toLocaleString('zh-CN')}</td>
                <td>
                  <button class="btn btn-sm btn-primary" onclick="window.location.href='/public/meeting.html?id=${m.id}&role=host'">进入</button>
                  <button class="btn btn-sm btn-danger" onclick="endMeeting('${m.id}')">结束</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
      } catch (err) {
        container.innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
      }
    }

    /**
     * 结束会议
     */
    async function endMeeting(id) {
      if (!confirm('确定要结束此会议吗？')) return;
      try {
        await API.endMeeting(id);
        showToast('会议已结束', 'success');
        loadMeetings();
      } catch (err) {
        showToast('操作失败: ' + err.message, 'error');
      }
    }

    /**
     * 加载配置信息（分组和成员）
     */
    async function loadConfigInfo() {
      try {
        configInfo = await API.getMeetingConfigInfo();

        // 渲染分组配置列表
        const groupListEl = document.getElementById('group-config-list');
        if (configInfo.groups.length > 0) {
          groupListEl.innerHTML = configInfo.groups.map(g => `
            <div style="padding: 4px 0; border-bottom: 1px solid var(--border);">
              <strong>${g.name}</strong>
              <span style="color: var(--text-secondary); margin-left: 8px;">(ID: ${g.id})</span>
            </div>
          `).join('');
        } else {
          groupListEl.innerHTML = '<p style="color: var(--text-secondary);">配置中未定义分组</p>';
        }

        // 渲染分组概览
        const groupsOverview = document.getElementById('groups-overview');
        if (configInfo.groups.length > 0) {
          groupsOverview.innerHTML = configInfo.groups.map(g => {
            const members = configInfo.users.filter(u => u.group === g.id);
            const moderator = configInfo.users.find(u => u.id === g.moderatorId);
            return `
              <div style="padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                  <strong>${g.name}</strong>
                  <span style="font-size: 12px; color: var(--text-secondary);">${members.length} 人</span>
                </div>
                <div style="font-size: 13px;">
                  主持人: ${moderator ? moderator.displayName : '未指定'}
                </div>
                <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">
                  成员: ${members.map(m => m.displayName).join(', ') || '无'}
                </div>
              </div>
            `;
          }).join('');
        } else {
          groupsOverview.innerHTML = '<div class="empty-state"><p>未配置分组</p></div>';
        }

        // 渲染全部成员
        const allMembers = document.getElementById('all-members');
        if (configInfo.users.length > 0) {
          allMembers.innerHTML = '<ul class="participant-list">' + configInfo.users.map(u => {
            const roleClass = u.role === 'host' ? 'role-host' : u.role === 'moderator' ? 'role-moderator' : 'role-member';
            const roleLabel = u.role === 'host' ? '总主持人' : u.role === 'moderator' ? '小组主持人' : '成员';
            const groupName = configInfo.groups.find(g => g.id === u.group)?.name || '';
            return `
              <li class="participant-item">
                <div class="participant-info">
                  <div class="participant-avatar">${u.displayName.charAt(0)}</div>
                  <div>
                    <strong>${u.displayName}</strong>
                    <span class="role-badge ${roleClass}" style="margin-left: 6px;">${roleLabel}</span>
                    ${groupName ? `<span style="font-size: 12px; color: var(--text-secondary); margin-left: 6px;">${groupName}</span>` : ''}
                  </div>
                </div>
              </li>
            `;
          }).join('') + '</ul>';
        }
      } catch (err) {
        console.error('加载配置失败:', err);
      }
    }

    // 初始化页面
    loadMeetings();
    loadConfigInfo();
  </script>
</body>
</html>
