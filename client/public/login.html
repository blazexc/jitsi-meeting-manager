<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会议管理系统 - 登录</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <!-- 登录页面容器 -->
  <div class="login-container">
    <div class="login-box">
      <h1>会议管理系统</h1>
      <p class="subtitle">请登录以进入系统</p>

      <!-- 登录方式切换 Tab -->
      <div class="login-tabs">
        <!-- 主持人登录 Tab -->
        <div class="login-tab active" onclick="switchTab('login')">主持人登录</div>
        <!-- 成员入会 Tab -->
        <div class="login-tab" onclick="switchTab('join')">成员入会</div>
      </div>

      <!-- 主持人登录表单 -->
      <div id="tab-login" class="tab-content active">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
          </div>
          <div id="login-error" style="color: var(--danger); margin-bottom: 12px; display: none;"></div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">登 录</button>
        </form>
      </div>

      <!-- 成员入会表单（通过会议ID和密码入会） -->
      <div id="tab-join" class="tab-content">
        <form onsubmit="handleJoin(event)">
          <div class="form-group">
            <label>会议 ID</label>
            <input type="text" id="meeting-id" placeholder="请输入会议 ID" required>
          </div>
          <div class="form-group">
            <label>入会密码</label>
            <input type="password" id="meeting-password" placeholder="请输入入会密码" required>
          </div>
          <div class="form-group">
            <label>您的姓名</label>
            <input type="text" id="display-name" placeholder="请输入您的姓名" required>
          </div>
          <div id="join-error" style="color: var(--danger); margin-bottom: 12px; display: none;"></div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="join-btn">加入会议</button>
        </form>
      </div>
    </div>
  </div>

  <!-- 加载 API 工具 -->
  <script src="/src/utils/api.js"></script>

  <script>
    /**
     * 切换登录方式 Tab
     * @param {string} tab - 'login' 或 'join'
     */
    function switchTab(tab) {
      // 切换 Tab 样式
      document.querySelectorAll('.login-tab').forEach((el, i) => {
        el.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'join' && i === 1));
      });
      // 切换内容显示
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-join').classList.toggle('active', tab === 'join');
    }

    /**
     * 处理主持人登录
     */
    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const data = await API.login(username, password);
        // 根据角色跳转到不同首页
        const role = data.user.role;
        if (role === 'host') {
          window.location.href = '/public/host-home.html';
        } else if (role === 'moderator') {
          window.location.href = '/public/moderator-home.html';
        } else {
          window.location.href = '/public/member-home.html';
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }

    /**
     * 处理成员入会
     */
    async function handleJoin(e) {
      e.preventDefault();
      const meetingId = document.getElementById('meeting-id').value.trim();
      const password = document.getElementById('meeting-password').value;
      const displayName = document.getElementById('display-name').value.trim();
      const errorEl = document.getElementById('join-error');
      const btn = document.getElementById('join-btn');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '加入中...';

      try {
        await API.joinMeeting(meetingId, password, displayName);
        // 入会成功，跳转到会议页面
        window.location.href = `/public/meeting.html?id=${meetingId}`;
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '加入会议';
      }
    }

    // 页面加载时检查是否已登录
    (function checkAuth() {
      const user = API.getCurrentUser();
      if (user && API.getToken()) {
        // 已登录，根据角色跳转
        if (user.role === 'host') {
          window.location.href = '/public/host-home.html';
        } else if (user.role === 'moderator') {
          window.location.href = '/public/moderator-home.html';
        } else {
          window.location.href = '/public/member-home.html';
        }
      }
    })();
  </script>
</body>
</html>
