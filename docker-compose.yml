# ============================================================
# 会议管理系统 Docker Compose 配置
#
# 定义了会议管理系统的容器编排配置。
# Jitsi 服务假设已经独立部署在同一台服务器上。
# ============================================================

version: '3.8'

services:
  # 会议管理系统（后端 + 前端）
  meeting-manager:
    build: .
    container_name: meeting-manager
    restart: unless-stopped
    ports:
      # 映射到主机端口 3000
      # 通过反向代理（Nginx）对外暴露
      - "3000:3000"
    volumes:
      # 持久化配置文件目录
      - ./server/config:/app/server/config
      # 持久化配置备份
      - ./config-backups:/app/config-backups
      # 持久化日志
      - ./logs:/app/logs
    environment:
      # 服务端口
      - PORT=3000
      # JWT 密钥（生产环境请修改）
      - JWT_SECRET=your-production-secret-key-change-this
      # Node 环境
      - NODE_ENV=production
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
