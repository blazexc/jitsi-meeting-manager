# --- 录制策略配置 ---
recording:
  # 默认是否录制
  defaultEnabled: false
  # 允许录制的角色
  allowedRoles:
    - "host"
    - "moderator"
  # 允许录制的房间（空数组表示所有房间）
  allowedRooms: []
  # 是否允许小组独立录制
  allowGroupRecording: true
  # 是否允许独立开启转写
  allowTranscription: false

# --- 通知配置 ---
notifications:
  # 是否启用系统通知
  enabled: true
  # 通知模板
  templates:
    # 加入会场通知
    join: "{displayName} 已加入 {roomName}"
    # 分组调度通知
    assign: "您已被分配到 {groupName}"
    # 录制开始通知
    recordStart: "会议录制已开始"
    # 录制结束通知
    recordStop: "会议录制已结束"
    # 分组创建通知
    groupCreate: "分组 {groupName} 已创建"
    # 分组关闭通知
    groupClose: "分组 {groupName} 已关闭"
